                </svg>
            </button>
            <span style="font-size:17px; font-weight:600; color:var(--text-800);">在线报名</span>

                </div>
                <div class="form-row" style="display:flex; flex-direction:column; padding-top:4px; padding-bottom:4px;">
                    <div class="input-wrapper">
                        <label>孩子年龄</label>
                        <input type="number" id="childAge" class="form-input" placeholder="请输入孩子年龄" min="6" max="18">
                    </div>
                </div>
                <div class="form-row" style="display:flex; flex-direction:column; padding-top:4px; padding-bottom:4px;">
                    <div class="input-wrapper">
                        <label>意向线路 <span style="color:var(--state-error);">*</span></label>
                        <select id="routeSelect" class="form-select" required style="padding-right:28px;">

                            <option value="北京6天">北京6天文化深度研学营 · ¥6,580/人</option>
                            <option value="沪宁锡7天">沪宁锡7天人文科技迪士尼 · ¥5,980/人</option>
                            <option value="粤港澳6天">粤港澳6天名校科技探索营 · ¥5,880/人</option>
                        </select>
                        <span class="select-arrow" style="position:absolute; right:0; top:50%; transform:translateY(-50%);">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                                <polyline points="6 9 12 15 18 9"></polyline>
                            </svg>
                        </span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Section 2 — 家长信息 -->

                    <div class="input-wrapper">
                        <label>家长姓名 <span style="color:var(--state-error);">*</span></label>
                        <input type="text" id="parentName" class="form-input" placeholder="请输入家长姓名" required>
                    </div>
                </div>
                <div class="form-row" style="display:flex; flex-direction:column; padding-top:4px; padding-bottom:4px;">
                    <div class="input-wrapper">
                        <label>联系电话 <span style="color:var(--state-error);">*</span></label>
                        <input type="tel" id="parentPhone" class="form-input" placeholder="请输入手机号码" maxlength="11" pattern="1[3-9]\d{9}" required>
                    </div>
                </div>
                <div class="input-error" id="phoneError">请输入正确的11位手机号码</div>
            </div>
        </div>

                        <select id="citySelect" class="form-select" required style="padding-right:28px;">
                            <option value="">请选择城市</option>
                            <option value="贵阳市">贵阳市</option>
                            <option value="遵义市">遵义市</option>
                            <option value="六盘水市">六盘水市</option>
                            <option value="安顺市">安顺市</option>
                            <option value="毕节市">毕节市</option>
                            <option value="铜仁市">铜仁市</option>
                            <option value="黔东南州">黔东南州</option>
                            <option value="黔南州">黔南州</option>

                        <span class="select-arrow" style="position:absolute; right:0; top:50%; transform:translateY(-50%);">

                                <polyline points="6 9 12 15 18 9"></polyline>
                            </svg>

                    </div>
                </div>
                <div class="form-row" style="display:flex; flex-direction:column; padding-top:4px; padding-bottom:4px;">
                    <div class="input-wrapper">
                        <label>报名门店 <span style="color:var(--state-error);">*</span></label>
                        <select id="storeSelect" class="form-select" required style="padding-right:28px;" disabled>

                        </svg>
                    </div>
                    <div>
                        <div style="font-size:15px; color:var(--text-800); font-weight:500;">咨询电话</div>
                        <div style="font-size:14px; color:var(--text-500); margin-top:2px;">XXX-XXXX-XXXX</div>

                </div>
                <div class="contact-item">
                    <div class="contact-icon" style="background:var(--background-100); color:var(--icon-600);">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="12" cy="12" r="10"/>

                        <div style="font-size:14px; color:var(--text-500); margin-top:2px;">周一至周日 9:00-18:00</div>
                    </div>
                </div>
            </div>
        </div>

        const citySelect = document.getElementById('citySelect');
        const storeSelect = document.getElementById('storeSelect');
        const storeBadge = document.getElementById('storeBadge');
        const storeBadgeText = document.getElementById('storeBadgeText');
        const agreementCheck = document.getElementById('agreementCheck');
        const submitBtn = document.getElementById('submitBtn');
        const phoneInput = document.getElementById('parentPhone');
        const phoneError = document.getElementById('phoneError');

        let isAgreed = false;

        // Tencent Cloud SCF API配置 - 部署后改成你的API网关地址
        var API_BASE = 'https://1411320533-k8vz2c5a8r.ap-guangzhou.tencentscf.com';  // SCF函数URL（API后端）

        // City selector onChange
        citySelect.addEventListener('change', function() {
            const city = this.value;
            storeSelect.innerHTML = '';

            if (city && storeData[city]) {
                storeSelect.disabled = false;
                const defaultOpt = document.createElement('option');
                defaultOpt.value = '';
                defaultOpt.textContent = '请选择报名门店';
                defaultOpt.style.color = 'var(--background-400)';
                storeSelect.appendChild(defaultOpt);

                storeData[city].forEach(function(store) {
                    const opt = document.createElement('option');
                    opt.value = store;
                    opt.textContent = store;
                    storeSelect.appendChild(opt);
                });

                storeBadge.style.display = 'none';
            } else {
                storeSelect.disabled = true;
                const defaultOpt = document.createElement('option');
                defaultOpt.value = '';
                defaultOpt.textContent = '请先选择城市';
                storeSelect.appendChild(defaultOpt);
                storeBadge.style.display = 'none';
            }

            validateForm();
        });

        // Store selector onChange
        storeSelect.addEventListener('change', function() {
            const store = this.value;
            const city = citySelect.value;
            if (store && city) {
                storeBadgeText.textContent = city + ' · ' + store;
                storeBadge.style.display = 'block';
            } else {
                storeBadge.style.display = 'none';
            }
            validateForm();
        });

        // Agreement checkbox
        agreementCheck.addEventListener('click', function() {
            isAgreed = !isAgreed;
            this.classList.toggle('checked', isAgreed);
            this.setAttribute('aria-checked', isAgreed);
            validateForm();
        });

        agreementCheck.addEventListener('keydown', function(e) {
            if (e.key === ' ' || e.key === 'Enter') {
                e.preventDefault();
                this.click();
            }
        });

        // Phone validation
        phoneInput.addEventListener('blur', function() {
            const val = this.value.trim();
            if (val && !/^1[3-9]\d{9}$/.test(val)) {
                phoneError.classList.add('visible');
            } else {
                phoneError.classList.remove('visible');
            }
        });

        phoneInput.addEventListener('input', function() {
            phoneError.classList.remove('visible');
            validateForm();
        });

        // Listen for changes on required fields
        ['childName', 'childAge', 'routeSelect', 'parentName', 'parentPhone', 'remark'].forEach(function(id) {
            const el = document.getElementById(id);
            if (el) {
                el.addEventListener('input', validateForm);
                el.addEventListener('change', validateForm);
            }
        });

        // Validate form
        function validateForm() {
            const childName = document.getElementById('childName').value.trim();
            const route = document.getElementById('routeSelect').value;
            const parentName = document.getElementById('parentName').value.trim();
            const phone = document.getElementById('parentPhone').value.trim();
            const city = citySelect.value;
            const store = storeSelect.value;

            const isValid = childName && route && parentName && phone && /^1[3-9]\d{9}$/.test(phone) && city && store && isAgreed;
            submitBtn.disabled = !isValid;
        }

        // Submit
        submitBtn.addEventListener('click', function() {
            if (this.disabled) return;

            const formData = {
                childName: document.getElementById('childName').value.trim(),
                childAge: document.getElementById('childAge').value,
                route: document.getElementById('routeSelect').value,
                parentName: document.getElementById('parentName').value.trim(),
                phone: document.getElementById('parentPhone').value.trim(),
                city: citySelect.value,
                store: storeSelect.value,
                remark: document.getElementById('remark').value.trim(),
                source: window.location.href
            };

            // Disable and show loading
            this.textContent = '提交中...';
            this.disabled = true;

            fetch((API_BASE || '') + '/api/signup', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(formData)
            })
            .then(function(r) { return r.json(); })
            .then(function(res) {
                if (res.success) {
                    submitBtn.textContent = '✅ 提交成功';
                    submitBtn.style.background = 'var(--state-success)';
                    submitBtn.style.boxShadow = 'none';
                    // 创建成功反馈浮层
                    var overlay = document.createElement('div');
                    overlay.style.cssText = 'position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.4);z-index:999;display:flex;align-items:center;justify-content:center;padding:32px;';
                    overlay.innerHTML =
                        '<div style="background:white;border-radius:20px;padding:32px;text-align:center;max-width:320px;width:100%;animation:fadeInUp 0.3s ease-out;">' +
                        '<div style="font-size:48px;margin-bottom:12px;">🎉</div>' +
                        '<h3 style="font-size:20px;margin-bottom:8px;color:#1d1d1f;">报名成功！</h3>' +
                        '<p style="font-size:15px;color:#6e6e73;line-height:1.5;margin-bottom:20px;">工作人员将在24小时内与您联系确认报名信息</p>' +
                        '<button onclick="this.closest(\\'[style*=\\"position:fixed\\"]\\').remove()" style="padding:12px 32px;border:none;border-radius:14px;background:#007aff;color:white;font-size:16px;font-weight:600;cursor:pointer;">我知道了</button>' +
                        '</div>';
                    document.body.appendChild(overlay);
                } else {
                    submitBtn.textContent = '提交报名';
                    submitBtn.disabled = false;
                    validateForm();
                    alert(res.message || '提交失败，请稍后重试');
                }
            })
            .catch(function() {
                submitBtn.textContent = '提交报名';
                submitBtn.disabled = false;
                validateForm();
                alert('网络异常，请检查网络后重试');
            });
        });
    </script>

    <style>
        @tailwind base;
        @tailwind components;
        @tailwind utilities;

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Helvetica Neue', sans-serif;
            background: var(--background-200);
            color: var(--text-800);
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* CSS variable resolution */
        :root {
            --brand-500: #007aff;
            --brand-400: #2e8dff;
            --brand-300: #66abff;
            --brand-200: #9fcbff;
            --brand-100: #cfe5ff;
            --brand-50: #e8f2ff;
            --brand-600: #0064d6;
            --brand-700: #004fad;
            --brand-800: #003b82;
            --brand-900: #00275a;
            --background-50: #ffffff;
            --background-100: #f7f7fa;
            --background-200: #f2f2f7;
            --background-300: #e5e5ea;
            --background-400: #d1d1d6;
            --background-500: #aeaeb2;
            --background-600: #8e8e93;
            --background-700: #3a3a3c;
            --background-800: #1c1c1e;
            --background-900: #000000;
            --text-50: #f5f5f7;
            --text-100: #e3e3e8;
            --text-200: #c7c7cc;
            --text-300: #aeaeb2;
            --text-400: #8e8e93;
            --text-500: #6e6e73;
            --text-600: #48484a;
            --text-700: #3c3c43;
            --text-800: #1d1d1f;
            --text-900: #000000;
            --icon-600: #6e6e73;
            --icon-500: #8e8e93;
            --state-error: #ff3b30;
            --state-error-dark: #ff453a;
            --state-error-surface: #ffecea;
            --state-success: #34c759;
            --state-success-surface: #e9f9ee;
        }

        /* Frosted glass header */
        .frost-header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            background: rgba(255,255,255,0.85);
            border-bottom: 0.5px solid var(--background-300);
        }

        /* Apple-style form group */
        .form-section {
            background: var(--background-50);
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 1px 2px 0 rgba(0,0,0,0.05), 0 1px 3px -1px rgba(0,0,0,0.05);
        }

        .form-section .form-row {
            padding: 0 16px;
        }

        .form-section .form-row + .form-row {
            border-top: 0.5px solid var(--background-300);
        }

        .form-input {
            width: 100%;
            padding: 14px 0;
            border: none;
            outline: none;
            font-size: 17px;
            color: var(--text-800);
            background: transparent;
        }

        .form-input::placeholder {
            color: var(--background-400);
        }

        .form-input:focus {
            outline: none;
        }

        .form-select {
            width: 100%;
            padding: 14px 0;
            border: none;
            outline: none;
            font-size: 17px;
            color: var(--text-800);
            background: transparent;
            -webkit-appearance: none;
            appearance: none;
            cursor: pointer;
        }

        .form-select::placeholder,
        .form-select option:first-child {
            color: var(--background-400);
        }

        .form-select:focus {
            outline: none;
        }

        .form-textarea {
            width: 100%;
            padding: 14px 0;
            border: none;
            outline: none;
            font-size: 17px;
            color: var(--text-800);
            background: transparent;
            resize: none;
            min-height: 100px;
        }

        .form-textarea::placeholder {
            color: var(--background-400);
        }

        .form-textarea:focus {
            outline: none;
        }

        /* Section label */
        .section-label {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-500);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            padding: 0 4px;
            margin-bottom: 8px;
        }

        /* Required asterisk */
        .required::after {
            content: "*";
            color: var(--state-error);
            margin-left: 2px;
        }

        /* Store badge */
        .store-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 14px;
            background: var(--brand-50);
            border-radius: 20px;
            font-size: 14px;
            font-weight: 500;
            color: var(--brand-700);
        }

        /* Submit button */
        .submit-btn {
            width: 100%;
            padding: 16px;
            border-radius: 16px;
            border: none;
            font-size: 17px;
            font-weight: 600;
            color: var(--background-50);
            background: var(--brand-500);
            cursor: pointer;
            transition: opacity 0.2s, transform 0.1s;
        }

        .submit-btn:active:not(:disabled) {
            opacity: 0.8;
            transform: scale(0.98);
        }

        .submit-btn:disabled {
            background: var(--background-400);
            cursor: not-allowed;
        }

        /* Agreement */
        .agreement-check {
            width: 22px;
            height: 22px;
            border-radius: 6px;
            border: 2px solid var(--background-400);
            background: var(--background-50);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: all 0.2s;
        }

        .agreement-check.checked {
            background: var(--brand-500);
            border-color: var(--brand-500);
        }

        .agreement-check.checked svg {
            display: block;
        }

        .agreement-check svg {
            display: none;
            color: white;
        }

        /* Select arrow */
        .select-arrow {
            color: var(--background-400);
            pointer-events: none;
            flex-shrink: 0;
        }

        /* Input field wrapper */
        .input-wrapper {
            display: flex;
            align-items: center;
            position: relative;
        }

        .input-wrapper label {
            font-size: 15px;
            color: var(--text-700);
            min-width: 72px;
            flex-shrink: 0;
            font-weight: 400;
        }

        /* Error state */
        .input-error {
            font-size: 13px;
            color: var(--state-error);
            padding-top: 4px;
            padding-left: 4px;
            display: none;
        }

        .input-error.visible {
            display: block;
        }

        /* Contact card */
        .contact-card {
            background: var(--background-50);
            border-radius: 16px;
            box-shadow: 0 1px 2px 0 rgba(0,0,0,0.05), 0 1px 3px -1px rgba(0,0,0,0.05);
            overflow: hidden;
        }

        .contact-item {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            padding: 14px 16px;
        }

        .contact-item + .contact-item {
            border-top: 0.5px solid var(--background-300);
        }

        .contact-icon {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            font-size: 16px;
        }

        /* Animation */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .animate-in {
            animation: fadeInUp 0.4s ease-out forwards;
        }

        .delay-1 { animation-delay: 0.05s; opacity: 0; }
        .delay-2 { animation-delay: 0.1s; opacity: 0; }
        .delay-3 { animation-delay: 0.15s; opacity: 0; }
        .delay-4 { animation-delay: 0.2s; opacity: 0; }
        .delay-5 { animation-delay: 0.25s; opacity: 0; }
        .delay-6 { animation-delay: 0.3s; opacity: 0; }
        .delay-7 { animation-delay: 0.35s; opacity: 0; }
    </style>
</body>
</html>
